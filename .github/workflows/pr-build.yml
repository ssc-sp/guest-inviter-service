---
name: PR Build

on:
  pull_request:
    branches:
      - main
    paths:
      - 'global.json'
      - 'Directory.Packages.props'
      - 'InviterService/**'

permissions: read-all

jobs:
  build:
    name: Build .NET Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # Reads the .NET 10.0.100 version directly from your global.json
          global-json-file: global.json 

      - name: Restore dependencies
        run: dotnet restore InviterService/InviterService.csproj

      - name: Build project
        run: dotnet build InviterService/InviterService.csproj --configuration Release --no-restore /warnaserror